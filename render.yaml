services:
  - type: web
    name: jax-dashboard
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_DIR
        value: /opt/render/project/src/render-data
    disk:
      name: dashboard-data
      mountPath: /opt/render/project/src/render-data
      sizeGB: 1
